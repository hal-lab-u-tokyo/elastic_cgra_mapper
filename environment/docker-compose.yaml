services:
  gurobi:
    platform: linux/amd64
    build:
      context: ../
      dockerfile: environment/Dockerfile
    tty: true
    command: /bin/bash
    stdin_open: true
    ports:
      - 1000:1000
    environment:
      - HOSTNAME_FROM_HOST=${HOSTNAME:-}
    volumes:
      - ..:/home/ubuntu/elastic_cgra_mapper
      - ../license_files/gurobi.lic:/opt/gurobi/gurobi.lic:ro
      - $HOME/.Xauthority:/root/.Xauthority
      - /etc/localtime:/etc/localtime:ro
